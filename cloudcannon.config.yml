paths:
  uploads: public/uploads
  static: public
collections_config:
  content_pages:
    path: src/content/pages
    icon: contact_page
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  posts:
    path: src/content/posts
    icon: event_available
    disable_url: false
    _inputs:
      $.title:
        type: textarea
        label: Page Title
        cascade: true
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  posts_examples:
    path: src/content/posts/examples
    icon: sound_sampler
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
  posts_releases:
    path: src/content/posts/_releases
    icon: auto_delete
    disable_url: false
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
_inputs:
  featured:
    type: switch
    comment: Feature this article on the homepage featured post's list.
    cascade: true
timezone: Asia/Saigon
markdown:
  engine: commonmark
  options:
    xhtml: false
    breaks: false
    linkify: false
    typographer: false
    spaced_lists: false
    sentence_per_line: false
    gfm: true
    code_block_fences: '```'
    escape_snippets_in_code_blocks: false
    treat_indentation_as_code: false
    table: true
    strikethrough: false
    subscript: true
    superscript: false
    heading_ids: false
    attributes: false

_editables:
  content:
    resize_style: contain
    expandable: false
    image_size_attributes: true
    prevent_resize_existing_files: false
    bold: true
    copyformatting: false
    italic: true
    link: true
    redo: false
    removeformat: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    undo: false
    blockquote: true
    bulletedlist: true
    code_inline: false
    code_block: false
    code: false
    embed: false
    horizontalrule: false
    image: true
    indent: false
    numberedlist: true
    outdent: false
    snippet: true
    table: true
    join_above: false
    join_below: false